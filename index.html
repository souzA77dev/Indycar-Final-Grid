<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Grid De Largada Oficial</title>

<style>
:root{

  --bg-main:#0b0f16;
  --bg-header:#111826;

  --row-a:#121826;
  --row-b:#0f1420;

  --red:#ff2e2e;
  --red-soft:#ff4a4a;

  --white:#f4f6fa;
  --muted:#8f9bb3;

}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:linear-gradient(180deg,#111827,#0b0f16);
  color:var(--white);
  font-family:"Segoe UI",Arial,sans-serif;
  font-size:13px;
}

/* HEADER */

header{
  padding:14px 20px;
  background:linear-gradient(90deg,#1a2235,#0c111a);
  border-bottom:2px solid var(--red);
  box-shadow:0 6px 16px rgba(0,0,0,.6);
}

header h1{
  margin:0;
  font-size:15px;
  font-weight:600;
  letter-spacing:2px;
  text-transform:uppercase;
}

/* LAYOUT */

.wrapper{
  padding:18px;
}

/* TABLE */

table{
  width:100%;
  border-collapse:collapse;
  background:linear-gradient(180deg,#0f1420,#0b0f16);
  border-radius:6px;
  overflow:hidden;

  box-shadow:
  0 10px 28px rgba(0,0,0,.7);
}

/* HEADER */

thead th{

  padding:10px 8px;

  font-size:11px;
  font-weight:600;

  color:var(--red-soft);

  text-transform:uppercase;
  letter-spacing:1.4px;

  border-bottom:2px solid #1d263a;
}

/* ROWS */

tbody tr{
  background:var(--row-a);
  transition:all .2s ease;
}

tbody tr:nth-child(even){
  background:var(--row-b);
}

tbody tr:hover{
  background:#1a2235;
}

/* CELLS */

td{
  padding:9px 8px;
  text-align:center;
  border-bottom:1px solid #0d1320;
}

td.left{
  text-align:left;
}

/* POS */

.pos{
  color:var(--red-soft);
  font-weight:700;
}

/* GAP */

.gap{
  color:var(--muted);
  font-size:12px;
}

/* BEST */

.best{
  font-weight:700;
  letter-spacing:.4px;
}

/* LEADER */

tr.leader{

  background:linear-gradient(90deg,#1f2a44,#0b0f16);

  box-shadow:
  inset 4px 0 0 var(--red),
  inset 0 1px 0 rgba(255,255,255,.08);
}

tr.leader .pos{
  color:#ffffff;
}

</style>
</head>

<body>

<header>
<h1>Grid Official · Qualifying · Chevrolet Detroit Grand Prix</h1>
</header>

<div class="wrapper">

<table>

<thead>
<tr>
<th>POS</th>
<th>NUM</th>
<th class="left">PILOTO</th>
<th class="left">EQUIPE</th>
<th>BEST</th>
<th>GAP</th>
</tr>
</thead>

<tbody id="grid"></tbody>

</table>

</div>

<script>

const drivers = [

  { num: 7, driver: "Tiago Souza", team: "Arrow Mclaren SPM", best:"01:15.6606" },
  { num: 17, driver: "Skyline", team: "Arrow Mclaren SPM", best:"01:15.8439" },
  { num: 1, driver: "Yugi", team: "Arrow Mclaren SPM", best:"NO TIME" },
  { num: 13, driver: "Luiz Costa", team: "Arrow Mclaren SPM", best:"NO TIME" },
  { num: 31, driver: "Miss Circle", team: "Chip Ganassi Racing Teams", best:"NO TIME" },
  { num: 93, driver: "Karin", team: "Chip Ganassi Racing Teams", best:"NO TIME" },
  { num: 48, driver: "Vitor Henrique", team: "Juncos Racing", best:"NO TIME" },
  { num: 26, driver: "Kudoeste", team: "Andretti Autosport", best:"NO TIME" },
  { num: 29, driver: "Mosquito", team: "Chip Ganassi Racing Teams", best:"NO TIME" },
  { num: 40, driver: "Cris Oliveira", team: "Dale Coyne with Vasser Sullivan", best:"NO TIME" },
  { num: 76, driver: "Nikolas", team: "Andretti Autosport", best:"NO TIME" },
  { num: 75, driver: "Ranniel Pereira", team: "DragonSpeed", best:"NO TIME" },
  { num: 55, driver: "Peter Saline", team: "Dale Coyne Team Goh", best:"NO TIME" },
  { num: 67, driver: "Renan Farias", team: "Team Penske", best:"NO TIME" },
  { num: 16, driver: "Celso Silva", team: "Andretti Autosport", best:"NO TIME" },
  { num: 78, driver: "Manelzinx", team: "AJ Foyt Racing", best:"NO TIME" },
  { num: 99, driver: "Oliveira King", team: "AJ Foyt Racing", best:"NO TIME" },
  { num: 59, driver: "Gabriel Pedra", team: "Carlin", best:"NO TIME" },
  { num: 15, driver: "Felps", team: "Ed Carpenter Racing", best:"NO TIME" },
  { num: 69, driver: "Pampam", team: "Andretti Autosport", best:"NO TIME" },
  { num: 19, driver: "Eduardo Bermudez", team: "Citrone Buhl RLL", best:"NO TIME" },
  { num: 97, driver: "Gabriel Moreira", team: "Carlin", best:"NO TIME" },
  { num: 65, driver: "Enty", team: "Rahal Letterman Lanigan", best:"NO TIME" },
  { num: 79, driver: "Juan Pablo Espinosa", team: "Rahal Letterman Lanigan", best:"01:14.1328" },
  { num: 56, driver: "Vitor Schmitz", team: "Team Penske", best:"NO TIME" },
  { num: 91, driver: "Sea MissXyz", team: "AJ Foyt Racing", best:"NO TIME" },
  { num: 88, driver: "BlankCamper", team: "Andretti Harding Steinbrenner Racing", best:"NO TIME" },
  { num: 8, driver: "Allan Jeferson", team: "Meyer-Shank Racing", best:"NO TIME" },
  { num: 98, driver: "Otávio Marinho", team: "Marco Andretti - Herta Autosport", best:"NO TIME" },
  { num: 70, driver: "Joseph", team: "Ed Carpenter Racing", best:"NO TIME" },
  { num: 33, driver: "Gabriel", team: "Team Penske", best:"NO TIME" },
  { num: 84, driver: "Lucas Taraciuk", team: "Dreyer Reinbold Racing", best:"NO TIME" },
  { num: 37, driver: "Vitor Borges", team: "Team Penske", best:"NO TIME" }

];

function toSeconds(t){
  return parseFloat(t);
}

function renderTable(){
  const tbody = document.getElementById("grid");
  tbody.innerHTML = "";

  drivers.sort((a,b)=>toSeconds(a.best)-toSeconds(b.best));
  const leaderTime = toSeconds(drivers[0].best);

  drivers.forEach((d,i)=>{
    const gap = i===0 ? "—" : "+"+(toSeconds(d.best)-leaderTime).toFixed(3);

    tbody.innerHTML += `
      <tr class="${i===0?"leader":""}">
        <td class="pos">${i+1}</td>
        <td>${d.num}</td>
        <td class="left">${d.driver}</td>
        <td class="left">${d.team}</td>
        <td class="best">${d.best}</td>
        <td class="gap">${gap}</td>
      </tr>
    `;
  });
}

renderTable();
</script>

</body>
</html>
