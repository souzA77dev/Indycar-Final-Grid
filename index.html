<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Grid De Largada Oficial</title>

<style>
:root{

  --bg-main:#0b0f16;
  --bg-header:#111826;

  --row-a:#121826;
  --row-b:#0f1420;

  --red:#ff2e2e;
  --red-soft:#ff4a4a;

  --white:#f4f6fa;
  --muted:#8f9bb3;

}

*{
box-sizing:border-box;
}

body{
margin:0;
background:linear-gradient(180deg,#111827,#0b0f16);
color:var(--white);
font-family:"Segoe UI",Arial,sans-serif;
font-size:13px;
}

header{
padding:14px 20px;
background:linear-gradient(90deg,#1a2235,#0c111a);
border-bottom:2px solid var(--red);
box-shadow:0 6px 16px rgba(0,0,0,.6);
}

header h1{
margin:0;
font-size:15px;
font-weight:600;
letter-spacing:2px;
text-transform:uppercase;
}

.wrapper{
padding:18px;
}

table{
width:100%;
border-collapse:collapse;
background:linear-gradient(180deg,#0f1420,#0b0f16);
border-radius:6px;
overflow:hidden;
box-shadow:0 10px 28px rgba(0,0,0,.7);
}

thead th{
padding:10px 8px;
font-size:11px;
font-weight:600;
color:var(--red-soft);
text-transform:uppercase;
letter-spacing:1.4px;
border-bottom:2px solid #1d263a;
}

tbody tr{
background:var(--row-a);
transition:.2s;
}

tbody tr:nth-child(even){
background:var(--row-b);
}

tbody tr:hover{
background:#1a2235;
}

td{
padding:9px 8px;
text-align:center;
border-bottom:1px solid #0d1320;
}

td.left{
text-align:left;
}

.pos{
color:var(--red-soft);
font-weight:700;
}

.best{
font-weight:700;
letter-spacing:.4px;
}

.gap{
color:var(--muted);
font-size:12px;
}

tr.leader{
background:linear-gradient(90deg,#1f2a44,#0b0f16);
box-shadow:
inset 4px 0 0 var(--red),
inset 0 1px 0 rgba(255,255,255,.08);
}

tr.leader .pos{
color:#fff;
}

</style>
</head>

<body>

<header>
<h1>Grid Official · Qualifying · Chevrolet Detroit Grand Prix</h1>
</header>

<div class="wrapper">

<table>

<thead>
<tr>
<th>POS</th>
<th>NUM</th>
<th class="left">PILOTO</th>
<th class="left">EQUIPE</th>
<th>BEST</th>
<th>GAP</th>
</tr>
</thead>

<tbody id="grid"></tbody>

</table>

</div>

<script>

const drivers = [

  { num: 7, driver: "Tiago Souza", team: "Arrow Mclaren SPM", best:"1:36.653" },
  { num: 17, driver: "Skyline", team: "Arrow Mclaren SPM", best:"NO TIME" },
  { num: 1, driver: "Yugi", team: "Arrow Mclaren SPM", best:"1:35.701" },
  { num: 13, driver: "Luiz Costa", team: "Arrow Mclaren SPM", best:"NO TIME" },
  { num: 26, driver: "Kudoeste", team: "Andretti Autosport", best:"NO TIME" },
  { num: 76, driver: "Nikolas", team: "Andretti Autosport", best:"NO TIME" },
  { num: 16, driver: "Celso Silva", team: "Andretti Autosport", best:"NO TIME" },
  { num: 69, driver: "Pampam", team: "Andretti Autosport", best:"NO TIME" },
  { num: 31, driver: "Miss Circle", team: "Chip Ganassi Racing Teams", best:"1:39.214" },
  { num: 93, driver: "Karin", team: "Chip Ganassi Racing Teams", best:"1:39.391" },
  { num: 29, driver: "Mosquito", team: "Chip Ganassi Racing Teams", best:"1:44.421" },
  { num: 67, driver: "Renan Farias", team: "Team Penske", best:"NO TIME" },
  { num: 37, driver: "Vitor Borges", team: "Team Penske", best:"NO TIME" },
  { num: 59, driver: "Gabriel Pedra", team: "Carlin", best:"NO TIME" },
  { num: 97, driver: "Gabriel Moreira", team: "Carlin", best:"NO TIME" },
  { num: 75, driver: "Ranniel Pereira", team: "DragonSpeed", best:"1:36.360" },
  { num: 78, driver: "Manelzinx", team: "AJ Foyt Racing", best:"1:36.802" },
  { num: 99, driver: "Oliveira King", team: "AJ Foyt Racing", best:"NO TIME" },
  { num: 91, driver: "Sea MissXyz", team: "AJ Foyt Racing", best:"NO TIME" },
  { num: 8, driver: "Allan Jeferson", team: "Meyer-Shank Racing", best:"NO TIME" },
  { num: 48, driver: "Vitor Henrique", team: "Juncos Racing", best:"NO TIME" },
  { num: 84, driver: "Lucas Taraciuk", team: "Dreyer Reinbold Racing", best:"NO TIME" },
  { num: 65, driver: "Enty", team: "Rahal Letterman Lanigan", best:"NO TIME" },
  { num: 40, driver: "Cris Oliveira", team: "Dale Coyne with Vasser Sullivan", best:"1:40.368" },
  { num: 55, driver: "Peter Saline", team: "Dale Coyne Team Goh", best:"NO TIME" }, 
  { num: 19, driver: "Eduardo Bermudez", team: "Citrone Buhl RLL", best:"NO TIME" },
  { num: 70, driver: "Joseph", team: "Ed Carpenter Racing", best:"1:37.196" },
  { num: 98, driver: "Otávio Marinho", team: "Marco Andretti - Herta Autosport", best:"NO TIME" },
  { num: 30, driver: "Mateus Lucas", team: "Andretti Harding Steinbrenner Racing", best:"NO TIME" }
  
];

function timeToSeconds(time){

if(time === "NO TIME") return Infinity;

const parts = time.split(":");

const minutes = parseInt(parts[0]);
const seconds = parseFloat(parts[1]);

return minutes * 60 + seconds;

}

function formatGap(gap){

return "+" + gap.toFixed(4);

}

function renderTable(){

const tbody = document.getElementById("grid");
tbody.innerHTML = "";

// ordenar tempos
drivers.sort((a,b)=>timeToSeconds(a.best)-timeToSeconds(b.best));

const leader = drivers.find(d => d.best !== "NO TIME");
const leaderTime = leader ? timeToSeconds(leader.best) : null;

drivers.forEach((d,i)=>{

let gap = "";

if(d.best === "NO TIME"){

gap = "—";

}else if(i === 0){

gap = "—";

}else{

gap = formatGap(timeToSeconds(d.best)-leaderTime);

}

tbody.innerHTML += `

<tr class="${i===0?"leader":""}">
<td class="pos">${i+1}</td>
<td>${d.num}</td>
<td class="left">${d.driver}</td>
<td class="left">${d.team}</td>
<td class="best">${d.best}</td>
<td class="gap">${gap}</td>
</tr>

`;

});

}

renderTable();

</script>

</body>
</html>
